name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: tsc · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Vault validate (dogfood frontmatter integrity)
        run: pnpm vault:validate

      - name: Vault paths audit (capability/element 의 path 가 실 코드 일치)
        run: pnpm vault:audit

      # vscode-plugin v0.5.0 (R13 #49–#54). Run unit + MCP-integration
      # tests, headless e2e via @vscode/test-electron, and verify the
      # plugin packages cleanly into a .vsix so we catch
      # marketplace-relevant regressions (manifest issues, missing files,
      # broken contributes) before publish. xvfb-run gives the test
      # harness a virtual display on Linux runners.
      - name: VSCode plugin — install + test + e2e + package
        run: |
          cd vscode-plugin
          npm install --no-audit --no-fund
          npm test
          xvfb-run -a npm run test:e2e
          npx @vscode/vsce package --no-yarn --out /tmp/oh-my-ontology-vscode.vsix
          ls -lh /tmp/oh-my-ontology-vscode.vsix

      # R11 #24 — audit-only e2e CI 게이트 시도했으나 CI 환경 navigation race
      # 빈도 높아 reverted (a11y-structure / aria-audit / overflow-sweep
      # mobile-390 등 회귀). audit spec 은 console dump 의도라 실질 가드 0
      # 이고 보수 부담이 가치를 초과. e2e CI 게이트는 #12 functional spec
      # 보수 완료 후 재평가. playwright.config.ts 의 webServer 는 로컬 e2e
      # 편의 위해 유지.

      - name: Build (static export)
        run: pnpm build

      - name: Bundle audit (firebase chunk leak guard)
        run: pnpm bundle:check
        continue-on-error: true
